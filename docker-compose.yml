# dliy io - Production docker-compose
# Pulls the pre-built image from Docker Hub instead of building locally.
#
# Usage:
#   curl -o docker-compose.yml https://raw.githubusercontent.com/deathlegionteamlk/dliy-io/main/docker-compose.yml
#   docker compose up -d
#   open http://localhost:3000

services:
  app:
    image: deathlegion/dliy-io:latest
    container_name: dliyio-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://dliyio:${POSTGRES_PASSWORD:-dliyio}@postgres:5432/dliyio?schema=public"
      REDIS_URL: "redis://redis:6379"
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-32-byte-hex-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - app-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dliyio

  postgres:
    image: postgres:16-alpine
    container_name: dliyio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dliyio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dliyio}
      POSTGRES_DB: dliyio
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dliyio -d dliyio"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dliyio

  redis:
    image: redis:7-alpine
    container_name: dliyio-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dliyio

networks:
  dliyio:
    driver: bridge

volumes:
  app-data:
  postgres-data:
  redis-data:
