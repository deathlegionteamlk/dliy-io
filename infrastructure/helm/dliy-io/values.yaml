# Default values for dliy-io Helm chart

replicaCount:
  app: 2
  worker: 2
  webhook: 2

image:
  repository: ghcr.io/death-legion/dliy-io
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podSecurityContext:
  fsGroup: 1001

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
  hosts:
    - host: dliy.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: dliy-io-tls
      hosts: [dliy.io]

resources:
  app:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 256Mi
  worker:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 512Mi
  webhook:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# External services
postgresql:
  enabled: true
  auth:
    username: dliyio
    password: change-me
    database: dliyio
  primary:
    persistence:
      size: 20Gi

redis:
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      size: 5Gi

# App env vars
env:
  NODE_ENV: production
  NEXTAUTH_URL: https://dliy.io
  # NEXTAUTH_SECRET, ENCRYPTION_KEY should come from secrets
  LOG_LEVEL: info

envFromSecret:
  - name: NEXTAUTH_SECRET
    key: nextauth-secret
  - name: ENCRYPTION_KEY
    key: encryption-key

nodeSelector: {}
tolerations: []
affinity: {}
