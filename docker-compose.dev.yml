# =============================================================================
# dliy io - Development docker-compose
# Hot-reload all services during local development
# =============================================================================
# Usage:
#   docker compose -f docker-compose.dev.yml up
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: dliyio-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dliyio
      POSTGRES_PASSWORD: dliyio
      POSTGRES_DB: dliyio
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dliyio -d dliyio"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dliyio-dev-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: dliyio-dev-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI

volumes:
  postgres-dev-data:
