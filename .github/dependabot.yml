version: 2
updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '02:00'
      timezone: UTC
    open-pull-requests-limit: 10
    versioning-strategy: increase
    commit-message:
      prefix: 'chore(deps)'
      include-scope: true
    labels:
      - dependencies
      - npm
    groups:
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react*'
      next:
        patterns:
          - 'next'
          - '@next/*'
      prisma:
        patterns:
          - 'prisma'
          - '@prisma/*'
      ui:
        patterns:
          - '@radix-ui/*'
          - '@xyflow/*'
          - 'lucide-react'
          - 'tailwindcss*'

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: 'chore(ci)'
    labels:
      - dependencies
      - github-actions

  # Docker base images
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: 'chore(docker)'
    labels:
      - dependencies
      - docker
